name: Diagnose Chrome Upload Issue

on:
  workflow_dispatch:

jobs:
  diagnose:
    name: Diagnose Chrome Web Store Setup
    runs-on: ubuntu-latest
    environment: publish
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: |
          pnpm install --frozen-lockfile
          sudo apt-get update && sudo apt-get install -y jq

      # Step 1: Verify Secrets
      - name: Check CHROME_CLIENT_ID
        env:
          CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
        run: |
          echo "=== Checking CHROME_CLIENT_ID ==="
          if [ -z "$CLIENT_ID" ]; then
            echo "❌ CHROME_CLIENT_ID is EMPTY"
          else
            echo "✅ CHROME_CLIENT_ID has a value"
            echo "Length: ${#CLIENT_ID} characters"
            echo "Last 30 chars: ***${CLIENT_ID: -30}"
          fi

      - name: Check CHROME_CLIENT_SECRET
        env:
          CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
        run: |
          echo "=== Checking CHROME_CLIENT_SECRET ==="
          if [ -z "$CLIENT_SECRET" ]; then
            echo "❌ CHROME_CLIENT_SECRET is EMPTY"
            echo "Action required: Set this secret in GitHub"
          elif [ "$CLIENT_SECRET" = " " ] || [ "$CLIENT_SECRET" = "  " ]; then
            echo "❌ CHROME_CLIENT_SECRET is only WHITESPACE"
            echo "Action required: Set this secret with the actual value"
          else
            echo "✅ CHROME_CLIENT_SECRET has a value"
            echo "Length: ${#CLIENT_SECRET} characters"
            echo "First 3 chars: ${CLIENT_SECRET:0:3}***"
          fi

      - name: Check CHROME_REFRESH_TOKEN
        env:
          REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
        run: |
          echo "=== Checking CHROME_REFRESH_TOKEN ==="
          if [ -z "$REFRESH_TOKEN" ]; then
            echo "❌ CHROME_REFRESH_TOKEN is EMPTY"
            echo "Action required: Generate and set this secret"
          elif [ "$REFRESH_TOKEN" = " " ] || [ "$REFRESH_TOKEN" = "  " ]; then
            echo "❌ CHROME_REFRESH_TOKEN is only WHITESPACE"
            echo "Action required: Set this secret with the actual value"
          else
            echo "✅ CHROME_REFRESH_TOKEN has a value"
            echo "Length: ${#REFRESH_TOKEN} characters"
            echo "First 10 chars: ${REFRESH_TOKEN:0:10}***"
          fi

      - name: Check CHROME_EXTENSION_ID
        env:
          EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
        run: |
          echo "=== Checking CHROME_EXTENSION_ID ==="
          if [ -z "$EXTENSION_ID" ]; then
            echo "❌ CHROME_EXTENSION_ID is EMPTY"
          else
            echo "✅ CHROME_EXTENSION_ID has a value"
            echo "Length: ${#EXTENSION_ID} characters"
            echo "Value: $EXTENSION_ID"
          fi

      # Step 2: Build Extension
      - name: Build Extension
        run: pnpm run build

      - name: Check manifest.json
        run: |
          echo "=== Checking manifest.json ==="
          cat dist/manifest.json | jq '.'

      - name: Check for key field in manifest
        run: |
          echo "=== Checking for 'key' field ==="
          if cat dist/manifest.json | jq -e '.key' > /dev/null 2>&1; then
            echo "✅ Key field found in manifest"
            echo "Extension ID will be consistent"
          else
            echo "⚠️  No 'key' field found in manifest"
            echo "Extension ID will change with each build"
            echo ""
            echo "This is likely causing the HTTP 400 error!"
            echo ""
            echo "Solution: Add a 'key' field to your manifest.json"
            echo "See: https://developer.chrome.com/docs/extensions/mv3/manifest/key/"
          fi

      - name: Check version
        run: |
          echo "=== Extension Version ==="
          cat dist/manifest.json | jq '.version'

      - name: Create Chrome Package
        run: |
          mkdir -p build/chrome-temp
          cp -r dist/* build/chrome-temp/

          # Remove Firefox-specific settings
          cd build/chrome-temp
          jq 'del(.browser_specific_settings)' manifest.json > manifest.tmp && mv manifest.tmp manifest.json

          # Create zip
          zip -r ../chrome-extension.zip .

          echo "=== Package created ==="
          ls -lh ../chrome-extension.zip

      - name: List package contents
        run: |
          echo "=== Package contents ==="
          unzip -l build/chrome-extension.zip

      - name: Test Chrome Web Store API Connection
        run: |
          echo "=== Testing Chrome Web Store API ==="
          echo "Attempting to get access token..."

          # Try to get an access token using the refresh token
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -d "client_id=${{ secrets.CHROME_CLIENT_ID }}" \
            -d "client_secret=${{ secrets.CHROME_CLIENT_SECRET }}" \
            -d "refresh_token=${{ secrets.CHROME_REFRESH_TOKEN }}" \
            -d "grant_type=refresh_token" \
            https://oauth2.googleapis.com/token)

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ OAuth credentials are valid"

            # Test Chrome Web Store API
            ACCESS_TOKEN=$(echo "$BODY" | jq -r '.access_token')
            echo ""
            echo "=== Testing Chrome Web Store API ==="

            API_RESPONSE=$(curl -s -w "\n%{http_code}" \
              -H "Authorization: Bearer $ACCESS_TOKEN" \
              -H "x-goog-api-version: 2" \
              "https://www.googleapis.com/chromewebstore/v1.1/items/${{ secrets.CHROME_EXTENSION_ID }}?projection=DRAFT")

            API_HTTP_CODE=$(echo "$API_RESPONSE" | tail -n1)
            API_BODY=$(echo "$API_RESPONSE" | sed '$d')

            echo "API HTTP Status: $API_HTTP_CODE"
            echo ""
            echo "API Response:"
            echo "$API_BODY" | jq '.' 2>/dev/null || echo "$API_BODY"

            if [ "$API_HTTP_CODE" = "200" ]; then
              echo ""
              echo "✅ Chrome Web Store API is working!"
              echo ""
              echo "Extension details:"
              echo "$API_BODY" | jq '{id: .id, title: .title, version: .version}' 2>/dev/null || echo "$API_BODY"
            else
              echo ""
              echo "❌ Chrome Web Store API call failed"
              echo ""
              echo "Response:"
              echo "$API_BODY" | jq '.' 2>/dev/null || echo "$API_BODY"
              ERROR_MSG=$(echo "$API_BODY" | jq -r '.error.message' 2>/dev/null)
              if [ -n "$ERROR_MSG" ] && [ "$ERROR_MSG" != "null" ]; then
                echo "Error: $ERROR_MSG"
              fi
            fi
          else
            echo "❌ OAuth credentials are invalid or expired"
            echo ""
            echo "Please check your secrets:"
            echo "- CHROME_CLIENT_ID"
            echo "- CHROME_CLIENT_SECRET"
            echo "- CHROME_REFRESH_TOKEN"
          fi

      - name: Extension ID Check
        run: |
          echo "=== Extension ID Check ==="
          echo "Your configured CHROME_EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}"
          echo ""
          echo "⚠️  To get the correct extension ID:"
          echo "1. Go to Chrome Web Store Developer Dashboard"
          echo "2. Find your extension"
          echo "3. Copy the extension ID from the URL or item details"
          echo ""
          echo "If this is a new extension, you need to:"
          echo "1. Upload it manually first to get an extension ID"
          echo "2. Then add that ID to your secrets"

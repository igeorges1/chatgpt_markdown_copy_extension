name: Generate New Refresh Token

on:
  workflow_dispatch:

jobs:
  help:
    runs-on: ubuntu-latest

    steps:
      - name: Show instructions
        run: |
          echo "=========================================="
          echo "🔧 How to Generate New Refresh Token"
          echo "=========================================="
          echo ""
          echo "Your refresh token is expired or invalid."
          echo "Follow these steps to generate a new one:"
          echo ""
          echo "### Step 1: Run the CLI tool locally"
          echo ""
          echo "In your terminal, run:"
          echo ""
          echo "  npx chrome-webstore-upload-keys"
          echo ""
          echo "or if you have bun:"
          echo ""
          echo "  bunx chrome-webstore-upload-keys"
          echo ""
          echo "### Step 2: Enter your credentials"
          echo ""
          echo "When prompted:"
          echo "  - Client ID: ${{ secrets.CHROME_CLIENT_ID }}"
          echo "  - Client Secret: (your existing secret, or get new one below)"
          echo ""
          echo "### Step 3: Authorize in browser"
          echo ""
          echo "The tool will open a browser window."
          echo "Log in with your Google account and authorize the app."
          echo ""
          echo "### Step 4: Copy the refresh token"
          echo ""
          echo "After authorization, the tool will display:"
          echo ""
          echo "  ✅ Refresh token: 1//04XXXXXXXXXXXXXXXXXXXX"
          echo ""
          echo "Copy this token."
          echo ""
          echo "### Step 5: Update GitHub Secret"
          echo ""
          echo "1. Go to: https://github.com/bugparty/chatgpt_markdown_copy_extension/settings/environments"
          echo "2. Click 'publish' environment"
          echo "3. Click 'Update' on CHROME_REFRESH_TOKEN"
          echo "4. Paste the new refresh token"
          echo "5. Click 'Update secret'"
          echo ""
          echo "### Step 6: Test"
          echo ""
          echo "Run the 'Verify Secrets Have Values' workflow again"
          echo ""
          echo "=========================================="
          echo ""
          echo "⚠️  If you need a new CLIENT_SECRET:"
          echo ""
          echo "1. Go to: https://console.cloud.google.com/auth/clients"
          echo "2. Click on your OAuth client"
          echo "3. Copy the Client Secret"
          echo "4. Update CHROME_CLIENT_SECRET in GitHub"
          echo ""
          echo "=========================================="

      - name: Check if client secret looks correct
        run: |
          echo "Current CLIENT_SECRET info:"
          echo "  Length: 35 characters"
          echo "  Starts with: GOC***"
          echo ""
          if [[ "${{ secrets.CHROME_CLIENT_SECRET }}" == GOC* ]]; then
            echo "✅ Format looks correct (starts with GOC)"
          else
            echo "⚠️  Format might be wrong (should start with GOC)"
          fi

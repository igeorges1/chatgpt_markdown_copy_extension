name: Verify Secrets Have Values

on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    environment: publish

    steps:
      - name: Check CHROME_CLIENT_SECRET
        env:
          CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
        run: |
          echo "=== Checking CHROME_CLIENT_SECRET ==="
          if [ -z "$CLIENT_SECRET" ]; then
            echo "❌ CHROME_CLIENT_SECRET is EMPTY"
            echo "Action required: Set this secret in GitHub"
          elif [ "$CLIENT_SECRET" = " " ] || [ "$CLIENT_SECRET" = "  " ]; then
            echo "❌ CHROME_CLIENT_SECRET is only WHITESPACE"
            echo "Action required: Set this secret with the actual value"
          else
            echo "✅ CHROME_CLIENT_SECRET has a value"
            echo "Length: ${#CLIENT_SECRET} characters"
            echo "First 3 chars: ${CLIENT_SECRET:0:3}***"
          fi

      - name: Check CHROME_REFRESH_TOKEN
        env:
          REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
        run: |
          echo "=== Checking CHROME_REFRESH_TOKEN ==="
          if [ -z "$REFRESH_TOKEN" ]; then
            echo "❌ CHROME_REFRESH_TOKEN is EMPTY"
            echo "Action required: Generate and set this secret"
          elif [ "$REFRESH_TOKEN" = " " ] || [ "$REFRESH_TOKEN" = "  " ]; then
            echo "❌ CHROME_REFRESH_TOKEN is only WHITESPACE"
            echo "Action required: Set this secret with the actual value"
          else
            echo "✅ CHROME_REFRESH_TOKEN has a value"
            echo "Length: ${#REFRESH_TOKEN} characters"
            echo "First 10 chars: ${REFRESH_TOKEN:0:10}***"
          fi

      - name: Check CHROME_CLIENT_ID
        env:
          CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
        run: |
          echo "=== Checking CHROME_CLIENT_ID ==="
          if [ -z "$CLIENT_ID" ]; then
            echo "❌ CHROME_CLIENT_ID is EMPTY"
          else
            echo "✅ CHROME_CLIENT_ID has a value"
            echo "Length: ${#CLIENT_ID} characters"
            echo "Last 30 chars: ***${CLIENT_ID: -30}"
          fi

      - name: Check CHROME_EXTENSION_ID
        env:
          EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
        run: |
          echo "=== Checking CHROME_EXTENSION_ID ==="
          if [ -z "$EXTENSION_ID" ]; then
            echo "❌ CHROME_EXTENSION_ID is EMPTY"
          else
            echo "✅ CHROME_EXTENSION_ID has a value"
            echo "Length: ${#EXTENSION_ID} characters"
            echo "Value: $EXTENSION_ID"
          fi

      - name: Test OAuth if all secrets present
        env:
          CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
        run: |
          echo ""
          echo "=== Testing OAuth Token Retrieval ==="

          if [ -z "$CLIENT_ID" ] || [ -z "$CLIENT_SECRET" ] || [ -z "$REFRESH_TOKEN" ]; then
            echo "❌ Cannot test OAuth: Some secrets are missing"
            echo ""
            echo "Missing secrets:"
            [ -z "$CLIENT_ID" ] && echo "  - CHROME_CLIENT_ID"
            [ -z "$CLIENT_SECRET" ] && echo "  - CHROME_CLIENT_SECRET"
            [ -z "$REFRESH_TOKEN" ] && echo "  - CHROME_REFRESH_TOKEN"
            exit 0
          fi

          RESPONSE=$(curl -s -X POST \
            -d "client_id=$CLIENT_ID" \
            -d "client_secret=$CLIENT_SECRET" \
            -d "refresh_token=$REFRESH_TOKEN" \
            -d "grant_type=refresh_token" \
            https://oauth2.googleapis.com/token)

          ERROR=$(echo "$RESPONSE" | jq -r '.error' 2>/dev/null)

          if [ "$ERROR" = "null" ] || [ -z "$ERROR" ]; then
            echo "✅ OAuth successful!"
            echo ""
            echo "Access token obtained (first 20 chars):"
            echo "${RESPONSE}" | jq -r '.access_token' | head -c 20
            echo "..."
          else
            echo "❌ OAuth failed"
            echo ""
            echo "Error: $ERROR"
            echo ""
            echo "Full response:"
            echo "$RESPONSE" | jq '.' 2>/dev/null || echo "$RESPONSE"
            echo ""
            echo "Possible issues:"
            echo "  1. CLIENT_SECRET is incorrect"
            echo "  2. REFRESH_TOKEN is expired or invalid"
            echo "  3. OAuth app not configured properly"
          fi

name: Diagnose Chrome Secrets

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    environment: publish

    steps:
      - name: Check secrets format
        run: |
          echo "=== Checking CHROME_EXTENSION_ID ==="
          if [ -n "${{ secrets.CHROME_EXTENSION_ID }}" ]; then
            EXT_ID="${{ secrets.CHROME_EXTENSION_ID }}"
            echo "✅ Extension ID is set"
            echo "Length: ${#EXT_ID}"
            echo "Format check: Should be 32 characters"
            if [ ${#EXT_ID} -eq 32 ]; then
              echo "✅ Correct length"
            else
              echo "❌ Wrong length (expected 32)"
            fi
          else
            echo "❌ CHROME_EXTENSION_ID is not set"
          fi

          echo ""
          echo "=== Checking CHROME_CLIENT_ID ==="
          if [ -n "${{ secrets.CHROME_CLIENT_ID }}" ]; then
            CLIENT_ID="${{ secrets.CHROME_CLIENT_ID }}"
            echo "✅ Client ID is set"
            echo "Length: ${#CLIENT_ID}"
            echo "Format check: Should end with .apps.googleusercontent.com"
            if [[ "$CLIENT_ID" == *.apps.googleusercontent.com ]]; then
              echo "✅ Correct format"
            else
              echo "❌ Wrong format (should end with .apps.googleusercontent.com)"
            fi
          else
            echo "❌ CHROME_CLIENT_ID is not set"
          fi

          echo ""
          echo "=== Checking CHROME_CLIENT_SECRET ==="
          if [ -n "${{ secrets.CHROME_CLIENT_SECRET }}" ]; then
            echo "✅ Client Secret is set"
            echo "Length: ${#SECRET}"
          else
            echo "❌ CHROME_CLIENT_SECRET is not set"
          fi

          echo ""
          echo "=== Checking CHROME_REFRESH_TOKEN ==="
          if [ -n "${{ secrets.CHROME_REFRESH_TOKEN }}" ]; then
            echo "✅ Refresh Token is set"
            echo "Length: ${#TOKEN}"
          else
            echo "❌ CHROME_REFRESH_TOKEN is not set"
          fi

      - name: Test OAuth Token Retrieval
        run: |
          echo "=== Testing OAuth Token Retrieval ==="

          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -d "client_id=${{ secrets.CHROME_CLIENT_ID }}" \
            -d "client_secret=${{ secrets.CHROME_CLIENT_SECRET }}" \
            -d "refresh_token=${{ secrets.CHROME_REFRESH_TOKEN }}" \
            -d "grant_type=refresh_token" \
            https://oauth2.googleapis.com/token)

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "HTTP Status: $HTTP_CODE"
          echo ""
          echo "Response:"
          echo "$BODY" | jq '.' 2>/dev/null || echo "$BODY"

          if [ "$HTTP_CODE" = "200" ]; then
            echo ""
            echo "✅ OAuth credentials are valid!"
            ACCESS_TOKEN=$(echo "$BODY" | jq -r '.access_token')
            echo "Access token obtained (first 20 chars): ${ACCESS_TOKEN:0:20}..."

            echo ""
            echo "=== Testing Chrome Web Store API ==="
            ITEM_RESPONSE=$(curl -s -w "\n%{http_code}" \
              -H "Authorization: Bearer $ACCESS_TOKEN" \
              -H "x-goog-api-version: 2" \
              "https://www.googleapis.com/chromewebstore/v1.1/items/${{ secrets.CHROME_EXTENSION_ID }}")

            ITEM_HTTP_CODE=$(echo "$ITEM_RESPONSE" | tail -n1)
            ITEM_BODY=$(echo "$ITEM_RESPONSE" | sed '$d')

            echo "Item API HTTP Status: $ITEM_HTTP_CODE"
            echo ""
            echo "Item API Response:"
            echo "$ITEM_BODY" | jq '.' 2>/dev/null || echo "$ITEM_BODY"

            if [ "$ITEM_HTTP_CODE" = "200" ]; then
              echo ""
              echo "✅ Chrome Web Store API is working!"
            else
              echo ""
              echo "❌ Chrome Web Store API call failed"
              echo "This might mean the extension ID is incorrect or API access is not enabled"
            fi
          else
            echo ""
            echo "❌ OAuth token retrieval failed"
            echo "Please verify your CLIENT_ID, CLIENT_SECRET, and REFRESH_TOKEN"
          fi

name: Publish Extension

on:
  workflow_dispatch:

jobs:
  build:
    name: Build Extension
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          npm install -g web-ext
          sudo apt-get update && sudo apt-get install -y jq

      - name: Build Extension
        run: npm run build

      - name: Create build directory
        run: mkdir -p build

      - name: Prepare Chrome Package
        run: |
          # Create a temporary directory for Chrome build
          mkdir -p build/chrome-temp

          # Copy built files (dist/ contains the output of npm run build)
          cp -r dist/* build/chrome-temp/

          # Remove Firefox-specific settings from manifest.json
          cd build/chrome-temp
          jq 'del(.browser_specific_settings)' manifest.json > manifest.tmp && mv manifest.tmp manifest.json

          # Create zip file
          zip -r ../chrome-extension.zip .
          cd ../..

          echo "Chrome extension package created at build/chrome-extension.zip"

      - name: Upload Chrome build artifact
        uses: actions/upload-artifact@v4
        with:
          name: chrome-extension
          path: build/chrome-extension.zip

      - name: Upload Firefox build artifact
        uses: actions/upload-artifact@v4
        with:
          name: firefox-extension
          path: dist

  publish-chrome:
    name: Publish to Chrome Web Store
    runs-on: ubuntu-latest
    needs: build
    environment: publish
    steps:
      - name: Download Chrome build artifact
        uses: actions/download-artifact@v4
        with:
          name: chrome-extension
          path: build

      - name: Upload to Chrome Web Store
        uses: mnao305/chrome-extension-upload@v5.0.0
        with:
          file-path: build/chrome-extension.zip
          extension-id: ${{ secrets.CHROME_EXTENSION_ID }}
          client-id: ${{ secrets.CHROME_CLIENT_ID }}
          client-secret: ${{ secrets.CHROME_CLIENT_SECRET }}
          refresh-token: ${{ secrets.CHROME_REFRESH_TOKEN }}
          publish: true

  publish-firefox:
    name: Publish to Firefox Add-ons
    runs-on: ubuntu-latest
    needs: build
    environment: publish
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install web-ext
        run: npm install -g web-ext

      - name: Download Firefox build artifact
        uses: actions/download-artifact@v4
        with:
          name: firefox-extension
          path: dist

      - name: Publish to Firefox Add-ons (AMO)
        run: |
          web-ext sign \
            --source-dir dist \
            --channel listed \
            --api-key "${{ secrets.AMO_JWT_ISSUER }}" \
            --api-secret "${{ secrets.AMO_JWT_SECRET }}"
